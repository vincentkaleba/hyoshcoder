<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1e24" />
      <stop offset="100%" stop-color="#2b2b36" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd700" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#ff8c00" stop-opacity="0" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGradient)" rx="12" />
  
  <!-- Subtle Grid -->
  <g stroke="#ffffff" stroke-opacity="0.05" stroke-width="1">
    <line x1="0" y1="100" x2="800" y2="100" />
    <line x1="0" y1="200" x2="800" y2="200" />
    <line x1="0" y1="300" x2="800" y2="300" />
    <line x1="0" y1="400" x2="800" y2="400" />
    <line x1="0" y1="500" x2="800" y2="500" />
    <line x1="100" y1="0" x2="100" y2="600" />
    <line x1="200" y1="0" x2="200" y2="600" />
    <line x1="300" y1="0" x2="300" y2="600" />
    <line x1="400" y1="0" x2="400" y2="600" />
    <line x1="500" y1="0" x2="500" y2="600" />
    <line x1="600" y1="0" x2="600" y2="600" />
    <line x1="700" y1="0" x2="700" y2="600" />
  </g>

  <!-- Abstract UI Elements -->
  <!-- Header Bar -->
  <rect x="40" y="40" width="720" height="30" rx="4" fill="#ffffff" fill-opacity="0.05" />
  <circle cx="65" cy="55" r="5" fill="#ff5f56" />
  <circle cx="85" cy="55" r="5" fill="#ffbd2e" />
  <circle cx="105" cy="55" r="5" fill="#27c93f" />

  <!-- Main Content Block -->
  <rect x="40" y="100" width="450" height="400" rx="8" fill="url(#glow)" />
  <rect x="40" y="100" width="450" height="400" rx="8" fill="#ffffff" fill-opacity="0.02" stroke="#ffffff" stroke-opacity="0.1" />
  
  <rect x="80" y="150" width="200" height="20" rx="4" fill="#ffffff" fill-opacity="0.1" />
  <rect x="80" y="200" width="370" height="12" rx="4" fill="#ffffff" fill-opacity="0.05" />
  <rect x="80" y="230" width="350" height="12" rx="4" fill="#ffffff" fill-opacity="0.05" />
  <rect x="80" y="260" width="300" height="12" rx="4" fill="#ffffff" fill-opacity="0.05" />

  <!-- Code / Image Block -->
  <rect x="80" y="310" width="370" height="150" rx="6" fill="#000000" fill-opacity="0.2" />
  <path d="M 120 385 L 140 365 L 160 385 M 155 385 L 190 350 L 230 390" stroke="#ffffff" stroke-opacity="0.1" stroke-width="3" fill="none" />
  <circle cx="140" cy="340" r="15" fill="#ffffff" fill-opacity="0.1" />

  <!-- Sidebar Blocks -->
  <rect x="520" y="100" width="240" height="120" rx="8" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.1" />
  <rect x="550" y="130" width="100" height="15" rx="4" fill="#ffffff" fill-opacity="0.1" />
  <rect x="550" y="170" width="180" height="10" rx="4" fill="#ffffff" fill-opacity="0.05" />

  <rect x="520" y="240" width="240" height="260" rx="8" fill="#ffffff" fill-opacity="0.03" stroke="#ffffff" stroke-opacity="0.1" />
  <rect x="550" y="280" width="180" height="180" rx="6" fill="#ffffff" fill-opacity="0.02" />
  
  <!-- Icon in center of sidebar block -->
  <path d="M 640 340 L 670 370 L 610 370 Z" fill="#ffd700" fill-opacity="0.2" />
  <path d="M 640 400 L 670 370 L 610 370 Z" fill="#ff8c00" fill-opacity="0.2" />

  <!-- Overlay text -->
  <text x="400" y="300" font-family="sans-serif" font-size="24" font-weight="bold" fill="#ffffff" fill-opacity="0.2" text-anchor="middle" dominant-baseline="middle" letter-spacing="4">
    PROJECT PREVIEW
  </text>
</svg>
